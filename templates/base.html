<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>{% block title %}EchoChat Demo{% endblock %}</title>
  <link rel="icon" href="/static/img/logo.svg"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"/>
  <link rel="stylesheet" href="/static/css/app.css"/>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#0E6AAD',
            accent:  '#1F9D8F',
            warning: '#E09B3A',
            danger:  '#C0392B',
            surface: '#FFFFFF',
            page:    '#F7F9FB',
            ink:     '#1F2937',
            muted:   '#6B7280',
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'sans-serif'],
            mono: ['JetBrains Mono', 'ui-monospace', 'monospace'],
          },
          boxShadow: {
            card: '0 1px 3px rgba(16,24,40,0.04)',
            cardHover: '0 4px 12px rgba(16,24,40,0.08)',
          },
          borderRadius: {
            xl2: '12px',
          },
        }
      }
    }
  </script>
</head>
<body class="bg-page text-ink font-sans antialiased">
  <div id="warmup-banner" class="hidden fixed top-3 left-1/2 -translate-x-1/2 z-50 px-4 py-2 rounded-full bg-warning/15 text-amber-800 border border-warning/30 text-sm font-medium shadow-card flex items-center gap-2 backdrop-blur">
    <svg class="animate-spin" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
    <span>Model is warming up. Inference tasks will queue until ready.</span>
  </div>
  {% block body %}{% endblock %}
  <script>
    (function () {
      const banner = document.getElementById('warmup-banner');
      if (!banner) return;
      let seenLoaded = false;
      async function poll() {
        try {
          const r = await fetch('/healthz', { cache: 'no-store' });
          const j = await r.json();
          if (j.model_loaded) {
            banner.classList.add('hidden');
            seenLoaded = true;
          } else if (!seenLoaded) {
            banner.classList.remove('hidden');
          }
        } catch (_) {}
        if (!seenLoaded) setTimeout(poll, 5000);
      }
      poll();
    })();
  </script>
</body>
</html>
